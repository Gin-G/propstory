name: Web front-end smoke test

# Loads the static front end in headless Chromium and runs a REAL GDEX query
# (geocoding bypassed via ?lat/lon) to measure in-browser zarrita read latency
# and surface errors. Artifacts: run log, table, screenshot.

on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]
    paths:
      - "web/**"
      - ".github/workflows/web-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - name: CDN diagnostic (which zarrita ESM URLs resolve?)
        run: |
          for u in \
            "https://esm.sh/zarrita@0.4.0?bundle" \
            "https://esm.sh/zarrita" \
            "https://cdn.jsdelivr.net/npm/zarrita/+esm" ; do
            echo "$(curl -s -o /dev/null -w '%{http_code}' "$u")  $u"
          done
          echo "npm latest: $(npm view zarrita version 2>/dev/null)"
      - name: Serve site
        run: |
          nohup python3 -m http.server 8080 --directory web >/dev/null 2>&1 &
          sleep 2
      - name: Run smoke test
        env:
          BASE_URL: http://localhost:8080
          YEARS: "2"
        run: node web/test/smoke.mjs | tee smoke_console.log
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke
          path: |
            artifacts/**
            smoke_console.log
