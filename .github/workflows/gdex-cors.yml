name: GDEX browser CORS probe

# Confirms whether the live in-browser GDEX path can work: does a cross-origin
# fetch of GDEX Zarr metadata from a real browser origin succeed, or does CORS
# (e.g. an OSDF redirect to a cache without CORS headers) block it?

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "web/test/gdex-cors.mjs"
      - ".github/workflows/gdex-cors.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - run: node web/test/gdex-cors.mjs | tee gdex_cors.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gdex-cors
          path: |
            artifacts/**
            gdex_cors.log
