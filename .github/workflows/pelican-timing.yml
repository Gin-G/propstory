name: Pelican-direct timing probe

# Times recent-window point reads through the Pelican director to decide whether
# a live in-browser "recent conditions" preview is fast enough to ship.

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "web/test/pelican-timing.mjs"
      - ".github/workflows/pelican-timing.yml"

jobs:
  time:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - run: node web/test/pelican-timing.mjs | tee pelican_timing.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pelican-timing
          path: |
            artifacts/**
            pelican_timing.log
