name: Deploy to GitHub Pages

# Publishes the static web/ app to GitHub Pages. No app changes needed: web/ uses
# relative paths and fetches all data client-side (GDEX, Nominatim, Esri — all
# CORS-open), so it works unchanged under a project Pages subpath.
#
# One-time setup in the repo:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   (Private repos require a paid GitHub plan for Pages.)
#   If deploying from a non-default branch, allow it in the "github-pages"
#   environment's deployment branch rules (Settings → Environments).

on:
  workflow_dispatch:
  push:
    branches: ["claude/**", "main"]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # NOTE: the workflow token cannot auto-create the Pages site here
        # ("Resource not accessible by integration"). Enable Pages once, manually:
        # Settings → Pages → Build and deployment → Source: "GitHub Actions".
        # Then pushes deploy automatically.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
