name: Build UI container

# Builds the static PropStory UI image (web/ + baked-in GDEX cells) and pushes it
# to GitHub Container Registry, ready to deploy to your cluster.

on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]
    paths:
      - "web/**"
      - "Dockerfile"
      - "deploy/nginx.conf"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gin-g/propstory-ui:latest
            ghcr.io/gin-g/propstory-ui:${{ github.sha }}
